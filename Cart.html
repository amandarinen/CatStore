    <link rel="stylesheet" href="CartStyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
<header class="navbar"> 
    <nav>
        <ul>
            <li><a href="HomePage.html"><i class="fa-solid fa-paw"></i> Home</a></li>

<div class="hero-cart">
    <h1 id="myHeader">Customer Cart</h1>
</div>

<main>
    <section>
        <div class="about-us" style="display: flex; justify-content: center;">
            <h3>This is your cart:</h3>
        </div>
    </section>
</main>

<div id="cart-container"></div>

<div id="cart-form">
  <form>
    <label for="fname">Full name:</label>
    <input type="text" id="fname" name="fname">

    <label for="mail">Mail address:</label>
    <input type="text" id="mail" name="mail">

    <label for="shippingaddress">Shipping Address:</label>
    <input type="text" id="shippingaddress" name="shippingaddress">

    <input type="submit" value="Checkout" onclick="checkout()">
  </form>
</div>

<script src="CartScript.js"></script>

<footer id="footer-text">
    <p>Contact us: 08-123456789</p>
</footer>
